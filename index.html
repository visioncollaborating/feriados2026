<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070b12">
  <meta name="description" content="Agenda visual 2026 inspirada en una aventura galáctica.">
  <title>Agenda Galáctica 2026</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="stars stars-one" aria-hidden="true"></div>
  <div class="stars stars-two" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="agenda-card" aria-label="Agenda 2026">
      <header class="hero" id="hero">
        <img id="mainImg" class="hero-image" src="img/1.jpg" alt="Imagen del mes de enero">
        <div class="hero-shade" aria-hidden="true"></div>

        <div class="topbar">
          <div class="brand">
            <img src="img/favicon.png" alt="" class="brand-icon">
            <div>
              <span class="brand-kicker">AGENDA</span>
              <strong>GALÁCTICA</strong>
            </div>
          </div>
          <span class="year-pill">2026</span>
        </div>

        <div class="hero-copy">
          <p class="eyebrow">Calendario anual</p>
          <h1 id="monthTitle">Enero</h1>
          <p id="eventSummary" class="event-summary">1 evento este mes</p>
        </div>
      </header>

      <section class="content-panel">
        <div class="month-nav" aria-label="Navegación por meses">
          <button class="nav-btn" id="prevBtn" type="button" aria-label="Mes anterior">
            <span aria-hidden="true">←</span>
          </button>

          <div class="month-center">
            <span id="monthNumber">01 / 12</span>
            <div class="progress-track" aria-hidden="true">
              <span id="progressBar"></span>
            </div>
          </div>

          <button class="nav-btn" id="nextBtn" type="button" aria-label="Mes siguiente">
            <span aria-hidden="true">→</span>
          </button>
        </div>

        <div class="section-heading">
          <div>
            <span class="mini-label">PRÓXIMAS FECHAS</span>
            <h2>Eventos del mes</h2>
          </div>
          <span id="eventCount" class="count-badge">1</span>
        </div>

        <div class="event-list" id="list" aria-live="polite"></div>

        <div class="month-dots" id="monthDots" aria-label="Seleccionar mes"></div>

        <footer class="footer-note">
          <span class="signal" aria-hidden="true"></span>
          <span>Que la organización te acompañe.</span>
        </footer>
      </section>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
